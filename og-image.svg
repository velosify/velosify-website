<svg width="1200" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="26%" r="30%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glow)"/>

  <!-- Stars -->
  <circle cx="100" cy="40" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="250" cy="75" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="400" cy="30" r="1.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="550" cy="60" r="1" fill="rgba(255,255,255,0.25)"/>
  <circle cx="700" cy="25" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="850" cy="50" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1000" cy="35" r="1.5" fill="rgba(255,255,255,0.35)"/>
  <circle cx="1100" cy="70" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="150" cy="250" r="1" fill="rgba(255,255,255,0.3)"/>
  <circle cx="350" cy="275" r="1.5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="600" cy="260" r="1" fill="rgba(255,255,255,0.4)"/>
  <circle cx="800" cy="280" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="1050" cy="250" r="1" fill="rgba(255,255,255,0.35)"/>
  <circle cx="80" cy="150" r="1" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1120" cy="160" r="1" fill="rgba(255,255,255,0.25)"/>

  <!--
    qlmanage renders 1200x1200 SVG into 1200x1200 PNG.
    We crop top 630px. So content must be within y=0..630.
    Center of crop band = y=315.
    Content block is ~340px tall (icon 90 + gap 20 + title 50 + gap 15 + tagline 20 + gap 25 + desc 50 + gap 20 + line 3 + gap 15 + url 15 = ~323).
    So start at y ≈ 315 - 170 = 145.
  -->

  <!-- Lightning bolt icon: 90x90 centered at x=600, top at y=105 -->
  <rect x="555" y="105" width="90" height="90" rx="22" fill="url(#accent)" opacity="0.15"/>
  <rect x="555" y="105" width="90" height="90" rx="22" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.4"/>
  <path d="M607 125l-20 26h16l-3 14 20-26h-16l3-14z" fill="url(#accent)"/>

  <!-- Title at y=250 -->
  <text x="600" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="60" font-weight="700" fill="url(#accent)">Velosify</text>

  <!-- Tagline at y=290 -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="18" font-weight="500" letter-spacing="3" fill="#818cf8">YOUR BUSINESS ON AUTOPILOT</text>

  <!-- Description lines at y=340, y=365 -->
  <text x="600" y="345" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="#8b92a5">Graphics, Web Design, CRMs, Smart Calendars,</text>
  <text x="600" y="370" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="17" fill="#8b92a5">Meta Ads, &amp; AI Voice — all in one place.</text>

  <!-- Accent line at y=420 -->
  <rect x="520" y="420" width="160" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>

  <!-- URL at y=455 -->
  <text x="600" y="455" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#5a6178">velosify.ai</text>
</svg>
