<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #050810;
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(99,102,241,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(167,139,250,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(99,102,241,0.05) 0%, transparent 50%);
  }
  .stars {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(2px 2px at 100px 80px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 250px 150px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 400px 60px, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 550px 120px, rgba(255,255,255,0.25), transparent),
      radial-gradient(2px 2px at 700px 50px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 850px 100px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 1000px 70px, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 1100px 140px, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 150px 500px, rgba(255,255,255,0.3), transparent),
      radial-gradient(2px 2px at 350px 550px, rgba(255,255,255,0.25), transparent),
      radial-gradient(1.5px 1.5px at 600px 520px, rgba(255,255,255,0.4), transparent),
      radial-gradient(2px 2px at 800px 560px, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 1050px 500px, rgba(255,255,255,0.35), transparent),
      radial-gradient(1.5px 1.5px at 180px 300px, rgba(255,255,255,0.2), transparent),
      radial-gradient(1.5px 1.5px at 1020px 320px, rgba(255,255,255,0.25), transparent);
    background-size: 1200px 630px;
  }
  .content {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%;
    text-align: center;
  }
  .icon {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 0 80px rgba(99,102,241,0.3);
  }
  .icon svg { width: 64px; height: 64px; }
  .title {
    font-size: 72px; font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px; letter-spacing: -1px;
  }
  .tagline {
    font-size: 22px; font-weight: 600;
    color: #818cf8; letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 24px;
  }
  .desc {
    font-size: 20px; color: #8b92a5; line-height: 1.6;
    max-width: 700px;
  }
  .line {
    width: 180px; height: 3px; border-radius: 2px;
    background: linear-gradient(135deg, #6366f1, #a78bfa);
    opacity: 0.5; margin: 28px auto 16px;
  }
  .url { font-size: 16px; color: #5a6178; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="stars"></div>
  <div class="content">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
    </div>
    <div class="title">Velosify</div>
    <div class="tagline">Your Business on Autopilot</div>
    <div class="desc">Graphics, Web Design, CRMs, Smart Calendars, Meta Ads, &amp; AI Voice &mdash; all in one place.</div>
    <div class="line"></div>
    <div class="url">velosify.ai</div>
  </div>
</body>
</html>
